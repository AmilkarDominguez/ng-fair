<div class="exhibitors-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Expositores</h1>
      <span class="page-subtitle">Gestión de empresas expositoras por edición</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Expositor
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar expositor</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Empresa, rubro o edición..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredExhibitors().length }} resultado(s)</span>
  </div>

  <app-exhibitor-table
    [data]="filteredExhibitors()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
