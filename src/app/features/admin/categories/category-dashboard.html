<div class="categories-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Categorías</h1>
      <span class="page-subtitle">Clasificación de productos por categoría</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nueva Categoría
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar categoría</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredCategories().length }} resultado(s)</span>
  </div>

  <app-category-table
    [data]="filteredCategories()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
